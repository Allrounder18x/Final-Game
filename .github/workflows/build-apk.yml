# Buildozer 1.x still resolves sdkmanager only under tools/bin/; Google ships it under cmdline-tools/latest/bin/.
# We patch the installed buildozer android target after pip install (reliable vs symlinks that CI may drop).
name: Build APK (Buildozer)

on:
  workflow_dispatch:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v5

      - name: Install system packages
        run: |
          set -e
          export DEBIAN_FRONTEND=noninteractive
          sudo apt-get update -y
          sudo apt-get install -y git zip unzip wget openjdk-17-jdk build-essential \
            libffi-dev libssl-dev autoconf libtool pkg-config zlib1g-dev \
            python3 python3-pip python3-dev python3-venv ccache

      - name: Install Buildozer (venv)
        run: |
          python3 -m venv ~/buildozer-env
          . ~/buildozer-env/bin/activate
          pip install --upgrade pip
          # Cython 3.1+ removed the `long` builtin; pyjnius (Kivy) still hits it in .pxi — pin <3.1
          pip install "Cython>=0.29.36,<3.1" buildozer

      - name: Patch Buildozer to use cmdline-tools sdkmanager
        run: |
          set -e
          . ~/buildozer-env/bin/activate
          export BUILDOZER_ANDROID_PY="$(python -c "import buildozer.targets.android as a, inspect; print(inspect.getfile(a))")"
          python << 'PY'
          import os
          path = os.environ["BUILDOZER_ANDROID_PY"]
          with open(path, encoding="utf-8") as f:
              text = f.read()
          # buildozer 1.5.x: join(..., 'tools', 'bin', 'sdkmanager')
          # buildozer master: join(..., 'tools', 'bin', sdk_manager_name)
          pairs = (
              (
                  "self.android_sdk_dir, 'tools', 'bin', sdk_manager_name",
                  "self.android_sdk_dir, 'cmdline-tools', 'latest', 'bin', sdk_manager_name",
              ),
              (
                  "self.android_sdk_dir, 'tools', 'bin', 'sdkmanager'",
                  "self.android_sdk_dir, 'cmdline-tools', 'latest', 'bin', 'sdkmanager'",
              ),
          )
          new_marker = "self.android_sdk_dir, 'cmdline-tools', 'latest', 'bin'"
          if new_marker in text and "self.android_sdk_dir, 'tools', 'bin'" not in text:
              print("Already patched:", path)
          else:
              patched = False
              for old, new in pairs:
                  if old in text:
                      text = text.replace(old, new, 1)
                      patched = True
                      break
              if not patched:
                  raise SystemExit(
                      "Could not patch buildozer android.py (pattern changed). "
                      "Check pip show buildozer version."
                  )
              with open(path, "w", encoding="utf-8") as f:
                  f.write(text)
              print("Patched:", path)
          PY

      - name: Android command-line tools + accept SDK licenses
        run: |
          set -e
          unset ANDROID_HOME ANDROID_SDK_ROOT ANDROID_NDK_HOME ANDROID_NDK_ROOT ANDROID_NDK ANDROID_NDK_LATEST_HOME || true
          SDK="${HOME}/.buildozer/android/platform/android-sdk"
          mkdir -p "${SDK}/cmdline-tools"
          if [ ! -x "${SDK}/cmdline-tools/latest/bin/sdkmanager" ]; then
            TMP="$(mktemp -d)"
            cd "${TMP}"
            wget -q -O cmdline.zip "https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip"
            unzip -qo cmdline.zip
            rm -rf "${SDK}/cmdline-tools/latest"
            mkdir -p "${SDK}/cmdline-tools"
            mv cmdline-tools "${SDK}/cmdline-tools/latest"
            cd /
            rm -rf "${TMP}"
          fi
          export JAVA_HOME="/usr/lib/jvm/java-17-openjdk-amd64"
          export PATH="${JAVA_HOME}/bin:${PATH}"
          java -version
          set +o pipefail
          yes | "${SDK}/cmdline-tools/latest/bin/sdkmanager" --sdk_root="${SDK}" --licenses
          set -o pipefail

      - name: Build debug APK
        working-directory: android_app
        env:
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
        run: |
          set -e
          # GitHub-hosted runners set ANDROID_* to /usr/local/lib/android/sdk — that mixes two SDKs/NDKs
          # with Buildozer's ~/.buildozer/... and breaks python-for-android toolchain create.
          unset ANDROID_HOME ANDROID_SDK_ROOT ANDROID_NDK_HOME ANDROID_NDK_ROOT ANDROID_NDK ANDROID_NDK_LATEST_HOME || true
          . ~/buildozer-env/bin/activate
          # Save full output so failures are visible in artifacts.
          set -o pipefail
          buildozer -v android debug 2>&1 | tee buildozer-ci.log

      - name: Upload APK
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: debug-apk
          path: android_app/bin/*.apk
          if-no-files-found: warn

      - name: Upload Build Logs
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: build-logs
          path: |
            android_app/buildozer-ci.log
            android_app/.buildozer/**/*.log
          if-no-files-found: warn
