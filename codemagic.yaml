workflows:
  android-kivy-debug:
    name: Android Kivy Debug APK
    max_build_duration: 120
    # Kivy/Buildozer lives in android_app; Codemagic wizard may not auto-detect it (no Flutter/Gradle at repo root).
    working_directory: android_app
    scripts:
      - name: Install Linux dependencies
        script: |
          set -e
          export DEBIAN_FRONTEND=noninteractive
          if [ "$(id -u)" = "0" ]; then
            apt-get update -y
            apt-get install -y git zip unzip openjdk-17-jdk build-essential libffi-dev libssl-dev autoconf libtool pkg-config zlib1g-dev python3 python3-pip python3-dev python3-venv ccache
          else
            sudo -E apt-get update -y
            sudo -E apt-get install -y git zip unzip openjdk-17-jdk build-essential libffi-dev libssl-dev autoconf libtool pkg-config zlib1g-dev python3 python3-pip python3-dev python3-venv ccache
          fi
      - name: Install Buildozer
        script: |
          set -e
          python3 -m venv ~/buildozer-env
          . ~/buildozer-env/bin/activate
          pip install --upgrade pip
          pip install cython buildozer
      - name: Build debug APK
        script: |
          set -e
          . ~/buildozer-env/bin/activate
          buildozer android debug
    artifacts:
      - android_app/bin/*.apk
